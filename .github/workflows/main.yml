name: refresh config_files

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */4 * * *"

jobs:
  refresh_config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        # On clone explicitement la branche main (la branche par défaut du projet).
        # fetch-depth: 0 récupère tout l'historique et toutes les branches distantes,
        # ce qui est nécessaire pour pouvoir basculer ensuite sur la branche dist.
        uses: actions/checkout@v3
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.8

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Generate config files
        # On génère les fichiers de configuration dans le dossier dist/.
        # Ce dossier est ignoré par .gitignore sur main : il ne sera jamais
        # commité sur cette branche, seulement utilisé comme espace de travail temporaire.
        run: |
          mkdir -p dist
          cat keys.txt | xargs -L 1 python main.py --referer https://cartes.gouv.fr/
          python main.py full

      - name: Push generated files to dist branch
        # On pousse le contenu généré sur la branche dédiée « dist »
        # via un worktree temporaire, sans changer la branche courante.
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          # Sauvegarde des fichiers générés hors du dépôt principal.
          cp -r dist /tmp/dist-generated

          # Prépare un worktree temporaire sur la branche dist.
          DIST_WORKTREE=/tmp/geoportal-dist-worktree
          rm -rf "$DIST_WORKTREE"
          git fetch origin dist:dist
          git worktree add "$DIST_WORKTREE" dist

          cd "$DIST_WORKTREE"
          git pull --rebase origin dist

          # Fusionne les fichiers générés dans dist/ sans supprimer les fichiers existants.
          # tous les fichiers non modifiés restent conservés
          mkdir -p dist
          rsync -a /tmp/dist-generated/ dist/

          # Commit uniquement si des modifications ont été détectées.
          git add dist/
          git diff --cached --quiet || git commit -m "refresh config files"
          git push origin dist

          cd "$GITHUB_WORKSPACE"
          git worktree remove --force "$DIST_WORKTREE"

      # - name: Trim dist branch history
      #   run: sh ./scripts/trim_dist_history.sh 100 dist

